<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} - Sports Tournament Management</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav>
        <div class = "nav-left">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('tournaments') }}">Tournaments</a>
        <a href="{{ url_for('teams') }}">Teams</a>
        <a href="{{ url_for('matches') }}">Matches</a>
        <a href="{{ url_for('standings') }}">Standings</a>
        </div>
        <div class="nav-right">
            {% if current_user.is_authenticated %}
                <div class="user-info">
                    <span>Welcome, {{ current_user.username }}!</span>
                    <a href="{{ url_for('logout') }}" class="logout">Logout</a>
                </div>
            {% else %}
                <a href="{{ url_for('register') }}" class="register">Register</a>
                <a href="{{ url_for('login') }}" class="login">Login</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
