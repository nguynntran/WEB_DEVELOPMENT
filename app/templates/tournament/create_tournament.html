{% extends "base.html" %}
{% block title %}Tournaments{% endblock %}
{% block content %}
    <h1>Create New Tournament </h1>
    <form method = "POST" action="{{url_for('create_tournament')}}" class="form">
        <label for="name">Tournament Name:</label>
        <input type="text" id="name" name="name" required>
        
        <label for="sport_type">Sport Type:</label>
        <select id="sport_type" name="sport_type" required>
            <option value="">Select Sport</option>
            <option value="Soccer">⚽️ Football</option>
            <option value="Basketball">🏀 Basketball</option>
            <option value="Tennis">🎾 Tennis</option>
            <option value="Volleyball">🏐 Volleyball</option>
            <option value="Badminton">🏸 Badminton</option>
            <option value="Table Tennis">🏓 Table Tennis</option>
            <option value="Boxing">🥊 Boxing</option>
            <option value="MMA">🥋 MMA</option>
            <option value="Esports">🎮 Esports</option>
            <option value="Swimming">🏊 Swimming</option>
        </select>
        
        <label for="format">Format:</label>
        <select id="format" name="format" required>
            <option value="">Select Format</option>
            <option value="Round Robin">🔄 Round Robin</option>
            <option value="Knockout">⚔️ Knockout</option>
            <option value="Swiss">🔀 Swiss</option>
            <option value="Group Stage + Knockout">📊 Group Stage + Knockout</option>
        </select>
        
        <label for="start_date">Start Date:</label>
        <input type="date" id="start_date" name="start_date" required>
        
        <label for="end_date">End Date:</label>
        <input type="date" id="end_date" name="end_date" required>
        
        <button type="submit" class="btn">Create Tournament</button>
        <a href="{{ url_for('tournaments') }}"><button type="button" class="btn" style="background-color: #007bff;">🏠 Back to Tournaments</button></a>
    </form>
{% endblock %}
