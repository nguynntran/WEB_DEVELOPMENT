{% extends "base.html" %}
{% block title %}Tournaments{% endblock %}
{% block content %}
    <h1>Edit Team</h1>
    <form method="POST" action="{{ url_for('edit_team', id=team.id) }}" class="form">
        <label for="name">Team Name:</label>
        <input type="text" id="name" name="name" value="{{ team.name }}" required>
        
        <label for="contact_info">Contact Information:</label>
        <input type="text" id="contact_info" name="contact_info" value="{{ team.contact_info }}" required>
        
        <label for="group_name">Group Name:</label>
        <input type="text" id="group_name" name="group_name" value="{{ team.group_name }}" required>
        
        <label for="members">Members (comma-separated):</label>
        <input type="text" id="members" name="members" value="{{ team.members }}" required>
        
        <button type="submit" class="btn">Update Team</button>
    </form>
    
{% endblock %}
